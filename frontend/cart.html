<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TechStore - Shopping Cart</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="nav-logo">
        <a href="index.html">🚀 TechStore</a>
      </div>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li>
          <a href="cart.html" class="cart-icon">
            Cart <span id="cart-badge">0</span>
          </a>
        </li>
        <li id="auth-link"><a href="login.html">Login</a></li>
      </ul>
    </div>
  </nav>

  <main>
    <h1 class="mb-2">Shopping Cart</h1>
    <div id="cart-content">
      <!-- Cart items will be loaded here -->
    </div>
  </main>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      renderCartPage();
    });

    function renderCartPage() {
      const cartItems = getCart();
      const container = document.getElementById('cart-content');
      
      if (cartItems.length === 0) {
        container.innerHTML = `<div class="alert alert-success">Your cart is empty. <a href="index.html">Go Back</a></div>`;
        return;
      }

      let html = `
        <table class="cart-table">
          <thead>
            <tr>
              <th>Product</th>
              <th>Price</th>
              <th>Quantity</th>
              <th>Total</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody>
      `;

      let total = 0;
      cartItems.forEach(item => {
        const itemTotal = item.price * item.qty;
        total += itemTotal;
        html += `
          <tr>
            <td>
              <img src="${item.image}" alt="${item.name}" class="cart-item-img">
              <a href="product.html?id=${item.product}">${item.name}</a>
            </td>
            <td>$${item.price.toFixed(2)}</td>
            <td>
              <select class="form-control" style="width: auto; padding: 0.25rem;" onchange="updateQty('${item.product}', this.value)">
                ${Array.from({length: Math.min(item.countInStock, 10)}, (_, i) => i + 1).map(x => 
                  `<option value="${x}" ${x === item.qty ? 'selected' : ''}>${x}</option>`
                ).join('')}
              </select>
            </td>
            <td>$${itemTotal.toFixed(2)}</td>
            <td>
              <button class="btn btn-danger" style="padding: 0.25rem 0.75rem;" onclick="remove('${item.product}')">Delete</button>
            </td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
        <div style="text-align: right;">
          <h2 class="mb-1">Subtotal (${cartItems.reduce((a, c) => a + c.qty, 0)}) items</h2>
          <h2 class="mb-2" style="color: var(--accent-color);">$${total.toFixed(2)}</h2>
          <button id="checkout-btn" class="btn">Proceed To Checkout</button>
        </div>
      `;

      container.innerHTML = html;

      document.getElementById('checkout-btn').addEventListener('click', () => {
        if (!getUserInfo()) {
          window.location.href = 'login.html';
        } else {
          window.location.href = 'checkout.html';
        }
      });
    }

    function updateQty(id, qty) {
      updateCartItem(id, Number(qty));
      renderCartPage();
    }

    function remove(id) {
      removeFromCart(id);
      renderCartPage();
    }
  </script>
</body>
</html>
